<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SubstantivoQuest — Tecnologia!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variáveis ──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark:      #05050f;
  --cyan:      #00f5ff;
  --pink:      #ff0080;
  --yellow:    #ffee00;
  --green:     #39ff14;
  --orange:    #ff8c00;
}

/* ─── Restrição de Desktop ──────────────────────────── */
#desktop-block {
    display: none;
    position: fixed; inset: 0; background: var(--dark);
    z-index: 10000; color: white; text-align: center;
    padding: 40px; flex-direction: column; justify-content: center; align-items: center;
    font-family: 'Press Start 2P', cursive;
}

@media (min-width: 1025px) {
    #desktop-block { display: flex; }
    .app { display: none; }
}

html, body {
  height: 100%; background: var(--dark);
  color: #fff; font-family: 'Orbitron', sans-serif;
  overflow-x: hidden; -webkit-tap-highlight-color: transparent;
}

.app { position: relative; z-index: 10; max-width: 860px; margin: 0 auto; padding: 20px; }

/* ─── HUD & Timer ────────────────────────────────────── */
.hud {
  display: grid; grid-template-columns: repeat(3, 1fr);
  background: rgba(255,140,0,0.1); border: 1px solid var(--orange);
  border-radius: 12px; padding: 15px; margin-bottom: 20px;
  font-family: 'Press Start 2P', monospace; font-size: 0.6rem;
}
.hud-item { text-align: center; }
.timer-box {
    grid-column: span 3; margin-top: 10px;
    background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden;
}
#timer-bar { height: 100%; background: var(--cyan); width: 100%; transition: width 1s linear; }

/* ─── Arena ─────────────────────────────────────────── */
.arena {
  background: rgba(255,255,255,0.03); border: 2px solid rgba(255,140,0,0.2);
  border-radius: 20px; padding: 30px; min-height: 250px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; margin-bottom: 20px;
}
.papao { font-size: 6rem; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); user-select: none; }
.papao.jump { transform: scale(1.3) translateY(-20px); }

.word-display {
    font-family: 'Fredoka One', cursive; font-size: 2.5rem;
    margin: 20px 0; color: var(--yellow); text-shadow: 0 0 10px rgba(255,238,0,0.5);
}

/* ─── Botões & Inputs ───────────────────────────────── */
.input-zone { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
.type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
.type-btn {
    flex: 1; padding: 15px; border-radius: 10px; border: 2px solid #333;
    background: #1a1a1a; color: #fff; font-family: 'Press Start 2P'; font-size: 0.5rem;
}
.type-btn.active-p { border-color: var(--cyan); background: rgba(0,245,255,0.2); color: var(--cyan); }
.type-btn.active-c { border-color: var(--green); background: rgba(57,255,20,0.2); color: var(--green); }

.word-input {
    width: 100%; padding: 15px; border-radius: 10px; border: none;
    font-size: 1.2rem; margin-bottom: 10px; text-align: center;
}

.btn-send {
    width: 100%; padding: 15px; border-radius: 10px; border: none;
    background: var(--orange); font-family: 'Press Start 2P'; cursor: pointer; color: #000;
}

.screen { display: none; animation: fadeIn 0.5s; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.clap-emoji {
    position: fixed; font-size: 2.5rem; pointer-events: none;
    animation: clapFly 1s forwards; z-index: 1000;
}
@keyframes clapFly {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
}
</style>
</head>
<body>

<div id="desktop-block">
    <span style="font-size: 4rem;">🚫</span>
    <p style="margin-top:20px">USE UM DISPOSITIVO MÓVEL</p>
    <p style="color: var(--cyan); margin: 10px 0;">CELULAR OU TABLET</p>
</div>

<div class="app">
    <section class="screen active" id="screen-intro">
        <div style="text-align:center; padding: 50px 0;">
            <span style="font-size: 5rem;">👾</span>
            <h1 style="font-family: 'Press Start 2P'; color: var(--orange); margin-top: 20px; font-size: 1.1rem;">PAPÃO DE PALAVRAS</h1>
            <p style="margin: 30px 0; font-size: 0.7rem; color: #aaa; line-height: 1.6;">
                <strong style="color:var(--cyan)">Próprio:</strong> Inicial MAIÚSCULA<br>
                <strong style="color:var(--green)">Comum:</strong> inicial minúscula
            </p>
            <button class="btn-send" onclick="startGame()">JOGAR! 🚀</button>
        </div>
    </section>

    <section class="screen" id="screen-game">
        <div class="hud">
            <div class="hud-item">PONTOS<br><span id="h-score" style="color:var(--orange)">0</span></div>
            <div class="hud-item">VIDAS<br><span id="h-lives">❤️❤️❤️</span></div>
            <div class="hud-item">TEMPO<br><span id="h-timer" style="color:var(--cyan)">15s</span></div>
            <div class="timer-box"><div id="timer-bar"></div></div>
        </div>

        <div class="arena">
            <div id="papao-sprite" class="papao">👾</div>
            <div id="target-cat" style="font-family:'Press Start 2P'; font-size:0.55rem; margin-top:15px; letter-spacing:1px;"></div>
            <div class="word-display" id="word-display">???</div>
        </div>

        <div class="input-zone">
            <div class="type-selector">
                <button id="btn-p" class="type-btn" onclick="selectType('proprio')">PRÓPRIO</button>
                <button id="btn-c" class="type-btn" onclick="selectType('comum')">COMUM</button>
            </div>
            <input type="text" id="word-input" class="word-input" placeholder="Escreva aqui..." autocomplete="off" autocapitalize="none">
            <button class="btn-send" onclick="handleVerify()">ENVIAR PALAVRA!</button>
        </div>
    </section>
</div>

<script>
// Áudio Global para o Meme
const memeSom = new Audio('https://www.myinstants.com/media/sounds/tecnologia_robotica.mp3');

// Sistema de Áudio Nativo (Beeps)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

// Objeto de Sons e Meme
const sound = {
    click: () => playTone(600, 'sine', 0.1),
    win: () => {
        memeSom.currentTime = 0;
        memeSom.play().catch(e => console.log("Erro ao tocar áudio"));
        playTone(500, 'square', 0.1); 
    },
    lose: () => { playTone(300, 'sawtooth', 0.1); setTimeout(()=>playTone(150, 'sawtooth', 0.3), 100); }
};

let gs = { score:0, lives:3, timeLeft:15, currentCat:'', selectedType:null, timerInterval:null };

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    // Inicia o áudio do meme no mudo para habilitar permissão no navegador
    memeSom.play().then(() => {
        memeSom.pause();
        memeSom.currentTime = 0;
    }).catch(e => console.log("Aguardando interação"));

    sound.click();
    gs.score = 0; gs.lives = 3;
    document.getElementById('screen-intro').classList.remove('active');
    document.getElementById('screen-game').classList.add('active');
    newRound();
}

function newRound() {
    clearInterval(gs.timerInterval);
    gs.timeLeft = 15;
    gs.selectedType = null;
    gs.currentCat = Math.random() > 0.5 ? 'proprio' : 'comum';
    
    document.getElementById('word-input').value = '';
    document.getElementById('word-display').textContent = '???';
    document.getElementById('word-display').style.color = 'var(--yellow)';
    
    document.getElementById('btn-p').className = 'type-btn';
    document.getElementById('btn-c').className = 'type-btn';
    
    const targetLabel = document.getElementById('target-cat');
    targetLabel.textContent = `VEZ DO SUBSTANTIVO: ${gs.currentCat.toUpperCase()}`;
    targetLabel.style.color = gs.currentCat === 'proprio' ? 'var(--cyan)' : 'var(--green)';
    
    updateHUD();
    startTimer();
}

function startTimer() {
    gs.timerInterval = setInterval(() => {
        gs.timeLeft--;
        updateHUD();
        if(gs.timeLeft <= 0) failRound("O tempo acabou! ⏰");
    }, 1000);
}

function updateHUD() {
    document.getElementById('h-score').textContent = gs.score;
    document.getElementById('h-lives').textContent = "❤️".repeat(gs.lives);
    document.getElementById('h-timer').textContent = gs.timeLeft + "s";
    document.getElementById('timer-bar').style.width = (gs.timeLeft / 15 * 100) + "%";
}

function selectType(t) {
    sound.click();
    gs.selectedType = t;
    document.getElementById('btn-p').className = t === 'proprio' ? 'type-btn active-p' : 'type-btn';
    document.getElementById('btn-c').className = t === 'comum' ? 'type-btn active-c' : 'type-btn';
}

function handleVerify() {
    const input = document.getElementById('word-input').value.trim();
    
    if(!input) { alert("Escreva uma palavra!"); return; }
    if(!gs.selectedType) { alert("Clique no botão PRÓPRIO ou COMUM!"); return; }

    const firstChar = input[0];
    const isUpper = firstChar === firstChar.toUpperCase() && firstChar !== firstChar.toLowerCase();
    
    let acerto = false;
    let motivoErro = "";

    if (gs.selectedType !== gs.currentCat) {
        motivoErro = `Confusão! Era ${gs.currentCat.toUpperCase()}, mas você marcou ${gs.selectedType.toUpperCase()}.`;
    } 
    else {
        if (gs.currentCat === 'proprio') {
            if (isUpper) acerto = true;
            else motivoErro = "Próprios precisam de letra MAIÚSCULA! (Ex: Pedro)";
        } else {
            if (!isUpper) acerto = true;
            else motivoErro = "Comuns precisam de letra minúscula! (Ex: gato)";
        }
    }

    if (acerto) successRound(input);
    else failRound(motivoErro);
}

function successRound(word) {
    clearInterval(gs.timerInterval);
    sound.win(); 
    gs.score += 10;
    
    const display = document.getElementById('word-display');
    display.textContent = word;
    display.style.color = 'var(--green)';
    document.getElementById('papao-sprite').classList.add('jump');
    
    for(let i=0; i<12; i++) {
        setTimeout(() => {
            const clap = document.createElement('div');
            clap.className = 'clap-emoji';
            clap.textContent = ['👏', '✨', '💻', '🤖', '⭐'][Math.floor(Math.random()*5)];
            clap.style.left = Math.random() * 80 + 10 + 'vw';
            clap.style.top = Math.random() * 50 + 20 + 'vh';
            document.body.appendChild(clap);
            setTimeout(() => clap.remove(), 1000);
        }, i * 60);
    }

    setTimeout(() => {
        document.getElementById('papao-sprite').classList.remove('jump');
        newRound();
    }, 2000); // Aumentado um pouco para dar tempo de ouvir o som
}

function failRound(msg) {
    clearInterval(gs.timerInterval);
    sound.lose();
    gs.lives--;
    alert(msg);
    
    if(gs.lives <= 0) {
        alert("GAME OVER! Pontos: " + gs.score);
        location.reload();
    } else {
        newRound();
    }
}
</script>
</body>
</html>
